<div #navSentinel class="nav-sentinel"></div>
<div class="page-width-controller z-50 w-full fixed top-0"
  [ngClass]="{ 'showNavPaddingTransition': isNavbarAtTop()}"
>
  <nav
  class="clcf-bg-primary shadow-2xl rounded-2xl inset-shadow-sm p-3"
  [ngClass]="{
        'showNavBorderRadiusTransition': isNavbarAtTop(),
        'openNavBarMobile': isMobileNavMenuOpen(),
      }"
>
  <div
    class="flex items-center"
    [ngClass]="LayoutService.isMobileView() ? 'justify-around' : 'justify-between gap-4'"
  >
    <a href="/">
      <img
        class="rounded"
        [ngSrc]="'/assets/CLCFLOGO.jpg'"
        alt="CLCF Logo"
        width="242.45"
        height="65"
        priority
      />
    </a>
    @if(LayoutService.isMobileView()){
      <button type="button">
        @if(!isMobileNavMenuOpen()){
          <mat-icon fontIcon="menu" class="clcf-color-secondary" (click)="toggleHamburger()"></mat-icon>
        }@else {
          <mat-icon
            fontIcon="close"
            class="clcf-color-secondary"
            (click)="toggleHamburger()"
          ></mat-icon>
        }
      </button>
    }@else {
      <ng-container *ngTemplateOutlet="navItems"></ng-container>
    }
  </div>
  @if(isMobileNavMenuOpen() && LayoutService.isMobileView()){
    <ng-container *ngTemplateOutlet="navItems"></ng-container>
  }
</nav>
</div>

<ng-template #navItems>
  <div
    [ngClass]="LayoutService.isMobileView() ? 'flex flex-col mt-3' : 'flex gap-4'"
  >
    <a class="clcf-color-secondary h5" href="/about">About</a>
    <a class="clcf-color-secondary h5" href="/parents">Parents</a>
    <a class="clcf-color-secondary h5" href="/coaches">Coaches</a>
    <a class="clcf-color-secondary h5" href="/events">Support</a>
    <a class="clcf-color-secondary h5" href="/about">Bulletin</a>
  </div>
</ng-template>
